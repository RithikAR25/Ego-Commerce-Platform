spring.application.name=raw-ego

# ===== Server =====
server.port=8080

# ===== MySQL DataSource =====
# Override all three via env vars in production (Railway, Docker, VPS).
# Dev defaults allow the app to boot against a local Docker MySQL with no extra config.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3307/rawego?serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
# show-sql: false by default to prevent SQL flooding in production logs.
# Override locally via SPRING_SHOW_SQL=true in IntelliJ run config or .env.
spring.jpa.show-sql=${SPRING_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true

# ===== JWT =====
# Secret: 64-char hex string = 256-bit key (sufficient for HS256).
# IMPORTANT: Override JWT_SECRET with a unique 256-bit hex key in EVERY production environment.
# Generate one: openssl rand -hex 32
# The dev default below is PUBLIC — never use it in production.
spring.jwt.secret=${JWT_SECRET}
# Access token: 15 minutes (ms) — 15 * 60 * 1000 = 900000
spring.jwt.access-token-expiry-ms=900000
# Refresh token: 30 days
spring.jwt.refresh-token-expiry-days=30
# Maximum concurrent active sessions (distinct login devices) per user.
# When exceeded, the oldest session is evicted automatically.
ego.auth.max-sessions-per-user=5

# ===== Swagger / OpenAPI =====
springdoc.swagger-ui.path=/docs
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method

# ===== Logging =====
logging.level.com.ego.raw_ego=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG

# ===== Cloudinary =====
# Bound from environment variables — set real values in IntelliJ run config or OS env
# Fallback placeholders let the app boot locally without Cloudinary configured
# (image upload calls will fail gracefully with a 5xx but all other endpoints work)
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:local-dev-placeholder}
cloudinary.api-key=${CLOUDINARY_API_KEY:local-dev-key}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:local-dev-secret}
# Active environment label — used in Cloudinary folder paths: ego/{env}/products/...
# Override to 'prod' in production via CLOUDINARY_ENV=prod
cloudinary.environment=${CLOUDINARY_ENV:dev}

# ===== File Upload Limits =====
# Max 5 MB per image file — enforced at both Spring layer and CloudinaryService validation
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ===== Redis =====
# Defaults to localhost:6379 for local dev (Docker container: ego-redis)
# Override via REDIS_HOST / REDIS_PORT / REDIS_PASSWORD env vars in production
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# ===== Cart =====
# Time-to-live for cart keys in Redis
ego.cart.ttl-days=7
# Checkout lock TTL — window during which inventory is pessimistically held (Phase 7)
ego.cart.checkout-lock-ttl-minutes=10

# ===== Razorpay (Phase 7) =====
# Fallback placeholders allow the app to boot without Razorpay configured
# (payment creation calls will fail gracefully but all other endpoints work)
razorpay.key-id=${RAZORPAY_KEY_ID:rzp_test_placeholder}
razorpay.key-secret=${RAZORPAY_KEY_SECRET:placeholder-secret}
# Webhook secret — set in Razorpay Dashboard → Settings → Webhooks → your endpoint → secret
razorpay.webhook-secret=${RAZORPAY_WEBHOOK_SECRET:placeholder-webhook-secret}
# Currency code for all orders — INR for Indian Rupee
razorpay.currency=INR

# ===== SendGrid (Phase 8 — Transactional Notifications) =====
# API key from SENDGRID_API_KEY env var — set in .env for local dev
sendgrid.api-key=${SENDGRID_API_KEY:SG.placeholder}
# Verified sender identity — must be authenticated in SendGrid dashboard
sendgrid.from-email=${SENDGRID_FROM_EMAIL:noreply@ego.com}
sendgrid.from-name=EGO

# ===== Async Executor (Phase 8 — @Async notification dispatchers) =====
# Dedicated thread pool for async event listeners (email sends).
# Keeps email I/O off the main request threads.
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=5
spring.task.execution.pool.queue-capacity=50
spring.task.execution.thread-name-prefix=ego-async-

# ===== Elasticsearch (Phase 4/14 — Full-text search & faceted filtering) =====
# Connection — override ES_HOST in production (e.g. http://ego-elasticsearch:9200)
spring.elasticsearch.uris=${ES_HOST:http://localhost:9200}
spring.elasticsearch.connection-timeout=5s
spring.elasticsearch.socket-timeout=10s

# ===== Search Outbox Poller =====
# How often the background poller processes PENDING outbox rows (ms)
ego.search.outbox.poll-interval-ms=5000
# Max rows per poll cycle — also controls ES bulk batch size
ego.search.outbox.batch-size=100
# Hard cap on search page size — prevents expensive queries
ego.search.max-page-size=100

# ===== Application URLs =====
# Base URL of the FRONTEND app — used to build email verification links.
# Local dev: http://localhost:5173 (Vite default)
# Production: override via APP_BASE_URL env var
ego.app.base-url=${APP_BASE_URL:http://localhost:5173}
